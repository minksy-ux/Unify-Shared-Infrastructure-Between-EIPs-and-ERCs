name: Auto Review Bot

on:
  workflow_run:
    workflows:
      - Auto Review Bot Trigger
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-review-bot:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Run
    steps:
      - name: Fetch PR Number
        id: fetch-pr-number
        continue-on-error: true
        uses: dawidd6/action-download-artifact@246dbf436b23d7c49e21a7ab8204ca9ecd1fe615
        with:
          name: pr-number
          workflow: auto-review-trigger.yml
          run_id: ${{ github.event.workflow_run.id }}

      - name: Check PR file existence
        id: check_pr_number
        run: |
          if [[ -f pr-number.txt ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save PR Number
        if: steps.check_pr_number.outputs.exists == 'true'
        id: save-pr-number
        run: echo "pr=$(cat pr-number.txt)" >> "$GITHUB_OUTPUT"

      - name: No-op when artifact missing
        if: steps.check_pr_number.outputs.exists != 'true'
        run: echo "No pr-number artifact for this trigger path; exiting successfully."

      - name: Auto Review Bot
        if: steps.check_pr_number.outputs.exists == 'true'
        id: auto-review-bot
        uses: ethereum/eip-review-bot@dist
        continue-on-error: true
        with:
          token: ${{ secrets.TOKEN }}
          config: config/eip-editors.yml
          pr_number: ${{ steps.save-pr-number.outputs.pr }}
