name: Update Shared Infra Tag

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-shared-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Resolve latest shared release tag
        id: latest
        run: |
          set -euo pipefail
          latest_tag="$(git ls-remote --tags --refs https://github.com/ethereum/eip-infra.git 'v*' | awk -F/ '{print $3}' | sort -V | tail -n1)"
          if [[ -z "$latest_tag" ]]; then
            echo "No release tag found" >&2
            exit 1
          fi
          echo "tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Pin submodule branch to release tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule set-branch --branch "${{ steps.latest.outputs.tag }}" infra/shared
          git submodule update --init --recursive --remote infra/shared
          git add .gitmodules infra/shared
          git diff --cached --quiet && echo "No update needed" && exit 0
          git commit -m "chore: pin shared infra to ${{ steps.latest.outputs.tag }}"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/update-shared-infra-tag
          title: "chore: update shared infra to ${{ steps.latest.outputs.tag }}"
          commit-message: "chore: update shared infra to ${{ steps.latest.outputs.tag }}"
          body: |
            Automated update to the latest shared infra release tag.

            - Shared tag: `${{ steps.latest.outputs.tag }}`
            - Please verify consumer CI passes before merge.
